<script type="text/javascript">
(function () {
    RED.nodes.registerType('ui-logo84', {
        category:     'EnergIAM',
        color:        '#27F555',
        icon:         'icon.png',
        inputs:       1,
        outputs:      0,
        paletteLabel: 'logo84',

        label: function () {
            return this.name || 'logo84'
        },
        labelStyle: function () {
            return this.name ? 'node_label_italic' : ''
        },

        defaults: {
            name:         { value: '' },
            group:        { value: '', type: 'ui-group', required: true },
            order:        { value: 0 },
            width:        { value: 12 },
            height:       { value: 10 },
            topicPrefix:  { value: 'energiam' },
            throttle:     { value: 10,  validate: RED.validators.number() },
            onlineTimeout:{ value: 60,  validate: RED.validators.number() },
            defaultNIn:   { value: 8,   validate: RED.validators.number() },
            defaultNOut:  { value: 4,   validate: RED.validators.number() },
            lcdPrefix:    { value: '' }
        },

        oneditprepare: function () {}
    })
})()
</script>

<script type="text/html" data-help-name="ui-logo84">
    <p>
        Widget <strong>Dashboard 2.0</strong> para visualización en tiempo real de dispositivos
        <strong>Siemens LOGO! 8.4</strong>. Parte del ecosistema <strong>EnergIAM</strong>.
    </p>

    <h3>Conexión</h3>
    <pre>[mqtt in — energiam/#] ──▶ [logo84]</pre>
    <p>
        El nodo <code>mqtt in</code> debe suscribirse al topic <code>energiam/#</code>
        con QoS 2. No se necesita ningún nodo función intermedio.
    </p>

    <h3>Formato del mensaje MQTT esperado</h3>
    <pre>topic:   "energiam/logo84pb/pub"
payload: {
  "state": {
    "reported": {
      "$logotime": 1781987649,
      "entrada1": { "desc": "I-bit-1-1", "value": [1] },
      "salida1":  { "desc": "Q-bit-1-1", "value": [0] }
    }
  }
}</pre>

    <h3>Lo que muestra el widget</h3>
    <ul>
        <li><strong>Tabla de estados</strong>: todos los LOGO! detectados, estado online/offline y última vez visto. Clic en una fila para seleccionar el dispositivo.</li>
        <li><strong>SVG del PLC</strong>: visualización dinámica del LOGO! seleccionado con pines I/Q coloreados en tiempo real. Configurable cantidad de entradas y salidas.</li>
        <li><strong>Tabla I/O</strong>: etiquetas editables para cada pin del dispositivo seleccionado. Se guardan automáticamente.</li>
    </ul>

    <h3>Detección de dispositivos</h3>
    <p>
        Los dispositivos se detectan automáticamente del topic MQTT.
        El nombre del logo se extrae de <code>energiam/<b>logo84pb</b>/pub</code>.
        No hay configuración manual de dispositivos.
    </p>

    <h3>Dependencias</h3>
    <ul>
        <li>Node-RED ≥ 3.0.0</li>
        <li>@flowfuse/node-red-dashboard ≥ 1.0.0</li>
    </ul>
</script>
